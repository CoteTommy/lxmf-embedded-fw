[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
extra_scripts = pre:tools/configure_rust_ffi.py

; BLE protocol stub for LXMF-rs camera capture smoke.
build_flags =
  -DCORE_DEBUG_LEVEL=0
  ; Optional:
  ; -DLXMF_LOG_FORMAT_JSON=1
  ; -DLXMF_LOG_FORMAT_BOTH=1
